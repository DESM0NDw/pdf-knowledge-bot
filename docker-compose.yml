services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - 1panel-network

  backend:
    build: ./backend
    container_name: pdf-bot-backend
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=1Panel-ollama-1RR8
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./docs:/docs
    depends_on:
      - qdrant
    networks:
      - 1panel-network

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true

volumes:
  qdrant_data:
